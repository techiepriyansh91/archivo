<style>

<body class="min-h-screen flex flex-col items-center justify-center p-gutter">
<!-- Atmospheric Background Glows -->
<div class="fixed top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container/5 rounded-full blur-[120px] pointer-events-none"></div>
<div class="fixed bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-secondary-container/10 rounded-full blur-[100px] pointer-events-none"></div>
<main class="w-full max-w-[420px] relative z-10">
<!-- Logo/Brand Header -->
<div class="flex flex-col items-center mb-xl">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center mb-md glow-soft rotate-3 hover:rotate-0 transition-transform duration-500 cursor-pointer">
<span class="material-symbols-outlined text-on-primary-container text-[32px]" style="font-variation-settings: 'FILL' 1;">folder_managed</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Archivo</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Secure knowledge architecture.</p>
</div>
<!-- Auth Card -->
<div class="bg-surface-container-lowest p-lg rounded-[24px] shadow-sm border border-outline-variant relative overflow-hidden">
<!-- Branding Detail: Type Strip -->
<div class="type-strip bg-secondary"></div>
<div class="mb-lg">
<h2 class="font-headline-md text-headline-md text-on-surface">Create Vault Account</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Initialize your encrypted environment.</p>
</div>
<!-- Sign Up Form -->
<form class="space-y-md" onsubmit="return false;">
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-xs">Full Name</label>
<div class="vault-input flex items-center bg-surface-container-low border border-outline-variant rounded-xl px-md py-3 transition-all duration-200">
<span class="material-symbols-outlined text-on-surface-variant mr-sm">person</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-lg text-body-lg placeholder:text-on-surface-variant/50" placeholder="Enter your full name" type="text"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-xs">Email Address</label>
<div class="vault-input flex items-center bg-surface-container-low border border-outline-variant rounded-xl px-md py-3 transition-all duration-200">
<span class="material-symbols-outlined text-on-surface-variant mr-sm">alternate_email</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-lg text-body-lg placeholder:text-on-surface-variant/50" placeholder="name@vault.com" type="email"/>
</div>
</div>
<div class="space-y-xs">
<label class="font-label-lg text-label-lg text-on-surface-variant ml-xs">Master Password</label>
<div class="vault-input flex items-center bg-surface-container-low border border-outline-variant rounded-xl px-md py-3 transition-all duration-200">
<span class="material-symbols-outlined text-on-surface-variant mr-sm">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-lg text-body-lg placeholder:text-on-surface-variant/50" placeholder="••••••••••••" type="password"/>
<button class="text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="pt-sm">
<button class="w-full bg-primary-container text-on-primary-container h-14 rounded-xl font-title-lg text-title-lg flex items-center justify-center gap-sm hover:brightness-110 active:scale-[0.98] transition-all shadow-md">
<span>Create Account</span>
<span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</div>
</form>
<!-- Divider -->
<div class="relative my-xl flex items-center">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="px-md font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Authorized via</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Provider -->
<button class="w-full bg-surface-container-high text-on-surface h-14 rounded-xl font-title-lg text-title-lg flex items-center justify-center gap-md hover:bg-surface-variant active:scale-[0.98] transition-all border border-outline-variant">

<span>Continue with Google</span>

<p class="mt-lg text-center font-label-md text-label-md text-on-surface-variant/70 leading-relaxed px-sm">

</p>

<!-- Branding Decor: Animated Particles (Subtle) -->
<div class="fixed inset-0 pointer-events-none z-0" id="particles"></div>
<script>
        // Simple micro-interaction for password toggle
        const toggleBtn = document.querySelector('button[type="button"]');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                const input = toggleBtn.previousElementSibling;
                const icon = toggleBtn.querySelector('.material-symbols-outlined');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.innerText = 'visibility_off';
                } else {
                    input.type = 'password';
                    icon.innerText = 'visibility';
                }
            });
        }

        // Particle background logic
        const particlesContainer = document.getElementById('particles');
        const colors = ['#303094', '#E3BF75', '#17137f'];
        
        for (let i = 0; i < 12; i++) {
            const dot = document.createElement('div');
            dot.className = 'absolute rounded-full opacity-10 animate-pulse';
            const size = Math.random() * 8 + 4;
            dot.style.width = `${size}px`;
            dot.style.height = `${size}px`;
            dot.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            dot.style.top = `${Math.random() * 100}%`;
            dot.style.left = `${Math.random() * 100}%`;
            dot.style.animationDelay = `${Math.random() * 5}s`;
            dot.style.animationDuration = `${5 + Math.random() * 10}s`;
            particlesContainer.appendChild(dot);
        }
    </script>
