<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-gentle {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.02); opacity: 0.9; }
        }

        .animate-fade-in-up {
            animation: fade-in-up 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .animate-pulse-gentle {
            animation: pulse-gentle 4s ease-in-out infinite;
        }

        .splash-overlay {
            background: linear-gradient(180deg, rgba(48, 48, 148, 0) 0%, rgba(23, 19, 127, 0.4) 100%);
        }
    </style>
</head>
<body class="bg-background text-on-background antialiased overflow-hidden">
<!-- Splash Screen Main Canvas -->
<!-- The Splash Screen is a Transactional/Success-like state, so TopAppBar and BottomNavBar are suppressed as per UI shell rules. -->
<main class="relative h-screen w-full flex flex-col items-center justify-center bg-primary-container overflow-hidden">
<!-- Subtle Atmospheric Gradient Layer -->
<div class="absolute inset-0 splash-overlay pointer-events-none"></div>
<!-- Content Container -->
<div class="relative z-10 flex flex-col items-center justify-center space-y-md animate-fade-in-up">
<!-- Branding Icon -->
<div class="relative w-48 h-48 md:w-64 md:h-64 mb-gutter flex items-center justify-center animate-pulse-gentle">
<!-- Large Scaled Archivo Icon -->
<img alt="Archivo Logo" class="w-full h-full object-contain filter drop-shadow-xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCJnOYzsBPN4ZD1ydcrYLYdnUiQTBJtuNb7kWJVy8d2s3TPbMl7A2rA-x1HCy_l_r3DLJHOzmUIscP5nUbzD-gXlb5lY0gPcs6-k7vxL4LK1N7LyLj6x7lsRbz5ZWT9GQdv4cJFppAf6ZGdLUgAgNMQ2wfKqR8dYghg5Hw2rNZtzcVC7GhVeoca_BGJSOQwgMeMQg_d49xEgSFf569iFj1ONB3ier1R271KJ_DN5mR3Q1gEB40xghr_FB_-S1v20qNy-zmytsNmc08"/>
</div>
<!-- Wordmark Section -->
<div class="text-center">
<h1 class="font-headline-lg text-headline-lg text-on-primary tracking-tight font-extrabold">
                    Archivo
                </h1>
<!-- Semantic spacing for vertical rhythm -->
<p class="mt-xs font-label-lg text-label-lg text-on-primary/60 uppercase tracking-[0.2em]">
                    Secure Personal Vault
                </p>
</div>
</div>
<!-- Loading Indicator / Micro-interaction -->
<div class="absolute bottom-16 flex flex-col items-center space-y-sm">
<div class="w-12 h-[2px] bg-on-primary/20 rounded-full overflow-hidden">
<div class="h-full bg-on-primary w-0 transition-all duration-[3000ms] ease-out" id="progress-bar"></div>
</div>
</div>
<!-- Background Aesthetic Elements (Geometric Twists) -->
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/20 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-surface-tint/20 rounded-full blur-3xl pointer-events-none"></div>
</main>
<script>
        // Micro-interaction: Progress bar simulation for splash transition
        window.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('progress-bar');
            if (progressBar) {
                // Trigger animation after a small delay
                setTimeout(() => {
                    progressBar.style.width = '100%';
                }, 100);
            }
        });

        // Subtle parallax or cursor effect could be added here for extra polish
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) - 0.5;
            const y = (e.clientY / window.innerHeight) - 0.5;
            const logo = document.querySelector('img');
            if (logo) {
                logo.style.transform = `translate(${x * 20}px, ${y * 20}px)`;
            }
        });
    </script>
</body></html>
