<script>
        // Micro-interactions and UI Logic
        const overflowBtn = document.getElementById('overflow-btn');
        const overflowMenu = document.getElementById('overflow-menu');

        overflowBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            overflowMenu.classList.toggle('hidden');
        });

        document.addEventListener('click', () => {
            overflowMenu.classList.add('hidden');
        });

        function openDetail(tagName) {
            // Simulated navigation
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-32 left-1/2 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-6 py-3 rounded-full font-label-lg shadow-xl z-[60] animate-bounce';
            toast.innerText = `Opening detail for ${tagName}...`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Add subtle parallax to chips on mouse move for desktop feel
        document.querySelectorAll('.pill-chip').forEach(chip => {
            chip.addEventListener('mousemove', (e) => {
                const rect = chip.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                chip.style.setProperty('--x', `${x}px`);
                chip.style.setProperty('--y', `${y}px`);
            });
        });
    </script>
