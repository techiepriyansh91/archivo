<script>
        const waveformContainer = document.getElementById('waveform-container');
        const barCount = 45;
        const bars = [];

        // Create waveform bars
        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'waveform-bar w-1.5 bg-secondary-fixed-dim rounded-full transition-all duration-150';
            // Random initial height for aesthetic
            const initialHeight = Math.floor(Math.random() * 40) + 10;
            bar.style.height = `${initialHeight}px`;
            waveformContainer.appendChild(bar);
            bars.push(bar);
        }

        // Animate waveform
        let isRecording = true;
        function updateWaveform() {
            if (!isRecording) return;
            bars.forEach(bar => {
                const height = Math.floor(Math.random() * 80) + 10;
                bar.style.height = `${height}px`;
                // Center-weighted height
                const index = bars.indexOf(bar);
                const distanceFromCenter = Math.abs(index - (barCount / 2));
                const factor = 1 - (distanceFromCenter / (barCount / 2));
                bar.style.height = `${height * factor + 5}px`;
                
                // Color shift based on intensity
                if (height > 60) {
                    bar.style.backgroundColor = '#755a1a'; // secondary (Gold)
                } else {
                    bar.style.backgroundColor = '#fed88b'; // secondary-container
                }
            });
            requestAnimationFrame(() => setTimeout(updateWaveform, 100));
        }
        updateWaveform();

        // Timer Logic
        let seconds = 222; // Starting at 03:42 as requested
        const timerDisplay = document.getElementById('timer-display');
        function updateTimer() {
            if (!isRecording) return;
            seconds++;
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${mins}:${secs}`;
        }
        setInterval(updateTimer, 1000);

        // Record Button Interaction
        const recordBtn = document.getElementById('record-btn');
        const micIcon = document.getElementById('mic-icon');
        const stopIcon = document.getElementById('stop-icon');
        const overlay = document.getElementById('transcription-overlay');

        recordBtn.addEventListener('click', () => {
            isRecording = !isRecording;
            if (!isRecording) {
                micIcon.classList.add('hidden');
                stopIcon.classList.remove('hidden');
                
                // Simulate "Transcribing" after a brief "stop" state
                setTimeout(() => {
                    overlay.classList.remove('hidden');
                    overlay.classList.add('flex');
                    
                    // After 3 seconds, simulate completion or transition
                    setTimeout(() => {
                        window.location.reload(); // Reset for demo
                    }, 4000);
                }, 400);
            }
        });

        // Background subtle noise/pattern for texture
        document.body.style.backgroundImage = `radial-gradient(#17137f11 1px, transparent 1px)`;
        document.body.style.backgroundSize = `24px 24px`;
    </script>
