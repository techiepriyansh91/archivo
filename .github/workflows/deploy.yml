name: Deploy (Android → Play internal)

# Builds a signed prod App Bundle and uploads it to the Play internal track.
# Runs on pushes to main, or manually. Requires these repo secrets:
#   ANDROID_KEYSTORE_BASE64      base64 of the upload keystore (.jks)
#   ANDROID_KEYSTORE_PASSWORD    store password
#   ANDROID_KEY_PASSWORD         key password
#   ANDROID_KEY_ALIAS            key alias (e.g. upload)
#   PLAY_SERVICE_ACCOUNT_JSON    Play API service-account JSON (full contents)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.38.3'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode upload keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 --decode > android/app/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      # github.run_number gives a monotonically increasing versionCode, which
      # Play requires to be higher than any previously uploaded build.
      - name: Build signed prod App Bundle
        run: |
          flutter build appbundle \
            --flavor prod \
            -t lib/main_prod.dart \
            --build-number=${{ github.run_number }}

      - name: Upload to Play internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.priyanshu.archivo
          releaseFiles: build/app/outputs/bundle/prodRelease/app-prod-release.aab
          track: internal
          status: completed
